<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" role="img" aria-labelledby="favicon-title">
	<title id="favicon-title">Nicole Rodriguez — portfolio mark</title>
	<defs>
		<linearGradient id="cosmo" x1="8" y1="6" x2="26" y2="28" gradientUnits="userSpaceOnUse">
			<stop stop-color="#D4849A" />
			<stop offset="0.55" stop-color="#e8a4b8" />
			<stop offset="1" stop-color="#4ADE80" />
		</linearGradient>
		<linearGradient id="orbit-fade" x1="4" y1="24" x2="28" y2="8" gradientUnits="userSpaceOnUse">
			<stop stop-color="#4ADE80" stop-opacity="0.45" />
			<stop offset="1" stop-color="#D4849A" stop-opacity="0.15" />
		</linearGradient>
		<radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(16 15) rotate(90) scale(10 12)">
			<stop stop-color="#D4849A" stop-opacity="0.35" />
			<stop offset="1" stop-color="#0d0d0d" stop-opacity="0" />
		</radialGradient>
	</defs>
	<!-- midnight field -->
	<rect width="32" height="32" rx="10" fill="#0d0d0d" />
	<!-- soft nebula -->
	<circle cx="16" cy="15" r="11" fill="url(#glow)" />
	<!-- distant stars -->
	<circle cx="9" cy="9" r="0.9" fill="#F5F0E8" opacity="0.35" />
	<circle cx="24" cy="11" r="0.65" fill="#4ADE80" opacity="0.5" />
	<circle cx="22" cy="24" r="0.55" fill="#D4849A" opacity="0.45" />
	<!-- orbit arc -->
	<path
		d="M5 20c4-6 18-8 22 2"
		stroke="url(#orbit-fade)"
		stroke-width="1"
		stroke-linecap="round"
		fill="none"
		opacity="0.85"
	/>
	<!-- north-star spark: reads clearly at 16px -->
	<path
		d="M16 6l1.15 5.85L23 13l-5.85 1.15L16 20l-1.15-5.85L9 13l5.85-1.15L16 6z"
		fill="url(#cosmo)"
		stroke="rgba(255,255,255,0.2)"
		stroke-width="0.5"
		stroke-linejoin="round"
	/>
	<circle cx="16" cy="13" r="1.35" fill="#F5F0E8" opacity="0.92" />
	<!-- frame -->
	<rect x="1.25" y="1.25" width="29.5" height="29.5" rx="9" stroke="url(#cosmo)" stroke-width="1" opacity="0.55" />
</svg>
